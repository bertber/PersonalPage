<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chien Feng Wang</title>
    <meta name="description" content="Personal webpage of Chien Feng Wang">
    <style>
        :root {
            --bg-color: #fdfdfd;
            --text-color: #222222;
            --link-color: #555555;
            --font-main: "Georgia", serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 5vw 8vw;
        }

        nav {
            display: flex;
            gap: 2rem;
            margin-bottom: 15vh;
            font-family: var(--font-sans);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.9rem;
        }

        nav a {
            color: var(--link-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--text-color);
        }

        main {
            flex-grow: 1;
            max-width: 900px;
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: normal;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            color: #111;
        }

        .author {
            font-style: italic;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: #666;
            display: flex;
            align-items: center;
        }

        .author::before {
            content: "—";
            margin-right: 1rem;
        }

        .time-container {
            margin-top: 5rem;
            font-family: var(--font-sans);
            font-size: 1rem;
            color: #888;
        }

        #time {
            font-variant-numeric: tabular-nums;
            font-weight: 500;
            color: #444;
        }
        
    </style>
</head>
<body>

    <nav>
        <a href="#">About</a>
        <a href="#">Work</a>
        <a href="#">Blog</a>
    </nav>

    <main>
        <h1>Coding and creating digital experiences</h1>
        <div class="author">Chien Feng Wang</div>
        
        <div class="time-container">
            Current local time: <span id="time"></span>
        </div>
    </main>

    <script>
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            const dateString = now.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            document.getElementById('time').textContent = `${dateString} ${timeString}`;
        }
        
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
